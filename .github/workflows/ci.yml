name: CI

on:
  push:
  pull_request:

jobs:
  backend-tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/api
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Prepare env
        run: |
          cp ../../.env.example ../../.env || true
          python - <<'PY'
          from pathlib import Path
          path = Path("../../.env")
          if path.exists():
              text = path.read_text(encoding="utf-8")
              text = text.replace("SECRET_KEY=", "SECRET_KEY=ci-secret-key")
              text = text.replace("FERNET_KEY=", "FERNET_KEY=AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA=")
              path.write_text(text, encoding="utf-8")
          PY
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Run pytest
        run: pytest

  frontend-build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: apps/web/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Build
        run: npm run build

  compose-validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Prepare env
        run: |
          cp .env.example .env || true
          python - <<'PY'
          from pathlib import Path
          path = Path(".env")
          if path.exists():
              text = path.read_text(encoding="utf-8")
              text = text.replace("SECRET_KEY=", "SECRET_KEY=ci-secret-key")
              text = text.replace("FERNET_KEY=", "FERNET_KEY=AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA=")
              path.write_text(text, encoding="utf-8")
          PY
      - name: Docker compose config
        run: docker compose config
